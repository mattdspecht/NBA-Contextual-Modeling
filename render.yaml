services:
  - type: web
    name: nba-prop-predictor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn nba.server.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NBA_PROP_BG_VIDEO_URL
        value: https://cdn.jsdelivr.net/gh/matspe24/NBA-Contextual-Modeling@main/nba/server/static/bg-loop.mp4
